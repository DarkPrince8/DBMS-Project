<!DOCTYPE html>
<html>
<head>
    <title>DBA Interface</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .header {
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
        }

        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            resize: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }
    </style>

</head>

<body>

<div class="header">
    CS241 DBMS Project
</div>

<div class="container">
    <h2>Database Administrator Interface</h2>

    <form action="QueryServlet" method="post">
        <textarea name="customQuery" rows="6" placeholder="Enter your SQL query here..."></textarea>
        <button type="submit">Execute Query</button>
    </form>
</div>

</body>
</html>
